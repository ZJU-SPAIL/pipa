# .gitlab-ci.yml

variables:
  # 定义 pre-commit 和 pip 的缓存目录
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

.base_python_job:
  # 动作1: 切换到包含构建工具的完整版官方镜像
  image: python:3.11
  before_script:
    # 不再需要 apt-get！
    - echo "Using pre-built environment from python:3.11 image."
    # 依然需要设置 pip 镜像源
    - pip config set global.index-url "http://mirrors.cloud.aliyuncs.com/pypi/simple/" && pip config set global.trusted-host "mirrors.cloud.aliyuncs.com"
    # 设置 uv 镜像源
    - export UV_INDEX_URL="http://mirrors.cloud.aliyuncs.com/pypi/simple/"
    # 设置 uv 允许覆盖系统包
    - export UV_BREAK_SYSTEM_PACKAGES=true
  cache:
    # 动作2: 实施多层聚合缓存
    # 使用 v2 key 来确保旧的、不完整的缓存失效
    key: "$CI_JOB_IMAGE-v2"
    paths:
      # 缓存 pip 下载的 wheel 文件
      - $PIP_CACHE_DIR
      # 缓存 pre-commit 的环境
      - $PRE_COMMIT_HOME
      # 关键：缓存 Python 的 site-packages 目录，即“已安装”的包
      # 这是 python:3.11 镜像中 site-packages 的标准路径
      - /usr/local/lib/python3.11/site-packages/

linting:
  extends: .base_python_job
  script:
    # 第一次运行时会安装，后续运行因为缓存将几乎瞬时完成
    - pip install uv
    - uv pip install --system -v .
    - echo "Running pre-commit checks on all files..."
    - pre-commit run --all-files
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

unit-tests:
  extends: .base_python_job
  script:
    - echo "Running unit tests..."
    # 同样，第一次安装，后续瞬时完成
    - pip install uv
    - uv pip install --system -v .
    - pytest --cov=src --cov-report=term-missing --cov-report=xml --junitxml=junit-report.xml
  artifacts:
    when: always
    paths:
      - coverage.xml
      - junit-report.xml
    reports:
      junit: junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.d+)?\%)$/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
