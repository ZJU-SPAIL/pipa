# .gitlab-ci.yml

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.base_python_job:
  image: python:3.11-slim
  before_script:
    # 使用国内镜像加速 apt 和 pip
    - sed -i 's|http[s]*://deb.debian.org|http://mirrors.cloud.aliyuncs.com|g' /etc/apt/sources.list.d/debian.sources
    - pip config set global.index-url "https://mirrors.aliyun.com/pypi/simple/"

    # 安装基础编译工具
    - apt-get update -y && apt-get install -y --no-install-recommends gcc git
  cache:
    key: "$CI_JOB_IMAGE"
    paths:
      - $PIP_CACHE_DIR

linting:
  extends: .base_python_job
  script:
    # 安装开发依赖以获取 black 和 flake8
    - pip install -r requirements.txt
    - echo "Running pre-commit checks on all files..."
    - pre-commit run --all-files
    - echo "Linting with flake8 and checking format with black..."
    - flake8 .
    - black --check .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"' # 我们的主分支是 develop

unit-tests:
  extends: .base_python_job
  script:
    - echo "Running unit tests..."
    # 正确的做法是安装 requirements.txt，因为它包含了 pytest 和所有生产依赖
    - pip install -r requirements.txt
    - pytest --cov=src --cov-report=term-missing --cov-report=xml --junitxml=junit-report.xml
  artifacts:
    when: always
    paths:
      - coverage.xml
      - junit-report.xml
    reports:
      # JUnit 测试报告集成
      junit: junit-report.xml
      # Cobertura 覆盖率报告集成
      cobertura: coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.d+)?\%)$/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"' # 我们的主分支是 develop
