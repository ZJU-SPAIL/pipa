# .gitlab-ci.yml

stages:
  - lint
  - test

variables:
  # 将一些常量定义为变量
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_INDEX_URL: "http://mirrors.cloud.aliyuncs.com/pypi/simple/" # 使用阿里云 PyPI 镜像
  PIP_TRUSTED_HOST: "mirrors.cloud.aliyuncs.com"

cache:
  key: "$CI_JOB_IMAGE"
  paths:
    - $PIP_CACHE_DIR
  policy: pull-push

.base_python_job:
  image: python:3.11-slim
  before_script:
    # **加入你指定的、精确的 sed 命令**
    - echo "Updating apt sources to use Aliyun ECS mirror..."
    - sed -i 's|http[s]*://deb.debian.org|http://mirrors.cloud.aliyuncs.com|g' /etc/apt/sources.list.d/debian.sources

    # 安装依赖
    - apt-get update -y
    - apt-get install -y --no-install-recommends gcc

    # 配置 pip
    - pip config set global.index-url $PIP_INDEX_URL
    - pip config set global.trusted-host $PIP_TRUSTED_HOST

    # 安装 Python 依赖
    - pip install --trusted-host $PIP_TRUSTED_HOST black flake8 flake8-black pytest pytest-cov

linting:
  extends: .base_python_job
  stage: lint
  script:
    - echo "Linting with flake8 and checking format with black..."
    - flake8 .
    - black --check .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

unit-tests:
  extends: .base_python_job
  stage: test
  script:
    - echo "Running unit tests..."
    - echo "No tests found, but job must succeed." # 占位符
    # - pytest --cov=src --cov-report=term --cov-report=xml
  # 覆盖率和制品部分暂时保持，未来启用 pytest 时生效
  artifacts:
    when: on_success
    reports:
      cobertura: coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.d+)?\%)$/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
