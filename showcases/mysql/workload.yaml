workload_name: mysql_showcase_dynamic

# --- 像 Dockerfile 一样的变量声明 ---
# 这些变量会按顺序解析，后面的可以引用前面的
variables:
  - DYNAMIC_NPROC: $(nproc)
  - DYNAMIC_HALF_PROC: $((${DYNAMIC_NPROC} / 2))
  - DYNAMIC_MYSQL_CPUS: "0-$((${DYNAMIC_HALF_PROC} - 1))"
  - DYNAMIC_SYSBENCH_CPUS: "${DYNAMIC_HALF_PROC}-$((${DYNAMIC_NPROC} - 1))"

# --- 服务管理 ---
commands:
  start: "LD_LIBRARY_PATH=${MYSQL_INSTALL_DIR}/lib taskset -c ${DYNAMIC_MYSQL_CPUS} ${MYSQL_INSTALL_DIR}/bin/mysqld_safe --defaults-file=${MY_CNF_PATH} &"
  stop: "LD_LIBRARY_PATH=${MYSQL_INSTALL_DIR}/lib ${MYSQL_INSTALL_DIR}/bin/mysqladmin -u root -p${MYSQL_ROOT_PASSWORD} --socket=${MYSQL_SOCKET_PATH} shutdown"
  health_check: "${MYSQL_INSTALL_DIR}/bin/mysqladmin ping --socket=${MYSQL_SOCKET_PATH}"

# --- 压测驱动定义 ---
benchmark_driver:
  command_template: >
    LD_LIBRARY_PATH=${MYSQL_INSTALL_DIR}/lib taskset -c ${DYNAMIC_SYSBENCH_CPUS} ${SYSBENCH_INSTALL_DIR}/bin/sysbench
    ${SYSBENCH_LUA_SCRIPT_PATH}
    --mysql-host=127.0.0.1 --mysql-port=${MYSQL_PORT} --mysql-user=root --mysql-password=${MYSQL_ROOT_PASSWORD}
    --mysql-db=sbtest --tables=${SYSBENCH_TABLES} --table-size=${SYSBENCH_TABLE_SIZE}
    --threads={intensity} --time=300 run

  intensity_variable:
    name: "threads"
    min: 8
    max: $((${DYNAMIC_NPROC} * 2))

  target_pid_command: "pgrep mysqld | tr '\\n' ',' | sed 's/,$//'"

# --- 目标负载等级与采集器配置 ---
target_load_levels:
  low:
    target_metric: "cpu_utilization"
    target_range: [15, 25]
  medium:
    target_metric: "cpu_utilization"
    target_range: [45, 55]
  high:
    target_metric: "cpu_utilization"
    target_range: [90, 100]

collectors:
  macro:
    - name: perf_stat
      enabled: true
      mode: "pid"
      all_threads: true
      interval: 1000
      events_profile: "cpu_basic"
    - name: sar_cpu
      enabled: true
      duration: 10
      interval: 1
