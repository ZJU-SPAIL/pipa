[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pipa"
version = "0.1.0"
description = "Performance Analytics & Calibration Engine"
requires-python = ">=3.10"
dependencies = ["click", "pyyaml", "pandas"]

[project.optional-dependencies]
dev = [
    "black",
    "flake8",
    "isort",
    "flake8-black",
    "pytest",
    "pre-commit",
    "pip-tools",
]

[project.scripts]
pipa = "pipa:cli"

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312", "py313"]

[tool.isort]
profile = "black"
line_length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = ["."]
addopts = "-m 'not integration'"
markers = [
    "integration: marks tests as integration tests (requires external dependencies like perf)",
]
# 如果需要集成测试同时运行，请`pytest -m "integration or not integration"`
