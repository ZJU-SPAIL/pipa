<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PIPA Analysis Report</title>
    <!-- 引入 Tabulator 的 CSS 和 JS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 2em;
        }

        h1,
        h2 {
            color: #333;
        }

        table {
            border-collapse: collapse;
            margin-top: 1em;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* 为 Tabulator 添加一些样式 */
        .tabulator {
            border: 1px solid #ddd;
            margin-top: 1em;
        }
    </style>
</head>

<body>
    <h1>PIPA Analysis Report</h1>
    {% if findings %}
    <h2>Key Findings & Insights</h2>
    <ul>
        {% for finding in findings %}
        {# 使用我们自定义的 markdown 过滤器，并保持 safe #}
        <li>{{ finding | markdown | safe }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <h2>Time-Series Visualization</h2>
    <div id="plot">
        {{ interactive_plot }}
    </div>

    <h2>Raw Aligned Data (Interactive)</h2>
    <div id="interactive-table"></div>

    <script>
        var tableData = {{ table_data_json | safe }};
        var table = new Tabulator("#interactive-table", {
            data: tableData,
            layout: "fitColumns",
            pagination: "local",
            paginationSize: 15,
            columns: [
                // 动态生成所有列的定义
                ...Object.keys(tableData[0] || {}).map(key => ({
                    title: key,
                    field: key,
                    headerFilter: "input"
                }))
            ],
        });
    </script>
</body>

</html>
