# ==========================================================
# PIPA 决策树 v3.1 (负载均衡 & NUMA 感知版)
# ==========================================================

# --- 1. 可配置阈值区 (Config) ---
config:
  # ON-CPU / OFF-CPU 分界线
  ON_CPU_THRESHOLD_PERCENT: 75

  CPU_CLUSTER_IDLE_THRESHOLD: 10.0 # 低于此值视为 Idle (Background)
  CPU_CLUSTER_BUSY_THRESHOLD: 15.0 # 高于此值视为 Busy (High Load)

  # 单核利用率过高的判定阈值
  CPU_MAX_UTIL_HIGH_THRESHOLD: 80.0

  # [NEW] NUMA 节点间最大利用率差异阈值 (%)
  NUMA_IMBALANCE_THRESHOLD: 20.0

  # TMA L1 瓶颈主导地位阈值
  TMA_DOMINANT_THRESHOLD_PERCENT: 20.0

  IPC_LOW_THRESHOLD: 1.0
  IPC_VERY_LOW_THRESHOLD: 0.7
  BRANCH_MISS_RATE_HIGH_PERCENT: 5.0
  L3_CACHE_MISS_RATE_HIGH_PERCENT: 3.0 # LLC miss rate
  HIGH_CSWCH_RATE_PER_SEC: 100000
  HIGH_LOAD_AVG_RATIO_TO_CPU: 0.8
  HIGH_IOPS_THRESHOLD: 800
  HIGH_SWAP_RATE_PER_SEC: 10
  IO_UTIL_HIGH_THRESHOLD: 75.0
  IO_AWAIT_HIGH_THRESHOLD: 20.0 # ms
  IO_QUEUE_HIGH_THRESHOLD: 5.0
  IO_SMALL_REQ_SIZE_THRESHOLD: 16.0 # KB
  NET_UTIL_HIGH_THRESHOLD: 90.0 # %
  NET_UTIL_LOW_THRESHOLD: 20.0 # %
  MEM_USED_HIGH_THRESHOLD: 85.0 # %
  MEM_COMMIT_HIGH_THRESHOLD: 100.0 # %
  MAJFLT_HIGH_THRESHOLD: 100.0 # major faults per second
  HIGH_IRQ_PERCENT_THRESHOLD: 20.0 # %
  HIGH_SOFTIRQ_PERCENT_THRESHOLD: 20.0 # %
  IO_WAIT_HIGH_THRESHOLD: 15.0 # %
  HIGH_NVCSWCH_RATE_PER_SEC: 10000 # 非自愿切换/秒

# --- 2. 规则定义区 (Rules) ---
rules:
  - name: "PIPA 根因分析"
    precondition: "True"
    sub_rules:
      # ===================== 核心变更：新增独立的 CPU 负载不均分支 =====================
      - name: "CPU 负载不均瓶颈"
        precondition: "is_cpu_imbalanced"
        finding: >-
          初步诊断：系统瓶颈为 <strong>CPU 负载严重不均</strong>。
          系统中的 CPU 核心已自动划分为 <strong>{cpu_clusters_count}</strong> 个不同的行为“部落”。
          其中，存在一个或多个数量较少、但高度繁忙的核心集群，而大多数核心处于空闲状态。
          这通常由**单线程瓶颈**、**线程绑定不当**或**跨 NUMA 调度问题**导致。

        sub_rules:
          # --- NUMA 不均衡检测 ---
          - name: "NUMA 节点负载失衡"
            precondition: "numa_nodes_count > 1 and numa_max_diff > NUMA_IMBALANCE_THRESHOLD"
            finding: >-
              架构风险：检测到 <strong>NUMA 节点间负载失衡</strong>。
              不同 NUMA 节点之间的 CPU 利用率差异高达 <strong>{numa_max_diff:.1f}%</strong>。
              <br>节点状态: {numa_status_msg}
              <br>这可能导致严重的<strong>远程内存访问 (Remote Memory Access)</strong> 延迟。建议检查进程绑核策略 (CPU Affinity) 是否导致某些节点过载而其他节点空闲。

          # --- 现有的 TMA 分析 ---
          - name: "微架构瓶颈 (TMA L1)"
            precondition: "True"
            sub_rules:
              - name: "前端瓶颈 (Frontend Bound)"
                precondition: "tma_frontend_bound > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>前端瓶颈 (Frontend Bound)</strong> 占比为 <strong>{tma_frontend_bound:.2f}%</strong>。CPU 指令供给侧（取指/解码）存在显著延迟。 (来源: {tma_source_label})"
              - name: "后端瓶颈 (Backend Bound)"
                precondition: "tma_backend_bound > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>后端瓶颈 (Backend Bound)</strong> 占比为 <strong>{tma_backend_bound:.2f}%</strong>。CPU 后端执行单元或内存子系统存在显著停顿。 (来源: {tma_source_label})"
              - name: "错误推测 (Bad Speculation)"
                precondition: "tma_bad_speculation > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>错误推测 (Bad Speculation)</strong> 占比为 <strong>{tma_bad_speculation:.2f}%</strong>。CPU 浪费了大量周期在最终被丢弃的指令路径上。 (来源: {tma_source_label})"
              - name: "指令交付 (Retiring)"
                precondition: "tma_retiring > 0"
                finding: "TMA L1 状态：<strong>指令交付率 (Retiring)</strong> 为 <strong>{tma_retiring:.2f}%</strong>，代表 CPU 流水线的实际有效产出。 (来源: {tma_source_label})"

      # ===================== ON-CPU 分支 (V3 - 全局繁忙) =====================
      - name: "ON-CPU 瓶颈 (全局繁忙)"
        precondition: "total_cpu > ON_CPU_THRESHOLD_PERCENT"
        finding: "初步诊断：系统瓶颈为 <strong>ON-CPU</strong>，总 CPU 利用率高达 <strong>{total_cpu:.2f}%</strong>。系统处于全局繁忙状态。"
        sub_rules:
          # --- 即使全局繁忙，也可能存在 NUMA 倾斜 ---
          - name: "NUMA 节点负载失衡"
            precondition: "numa_nodes_count > 1 and numa_max_diff > NUMA_IMBALANCE_THRESHOLD"
            finding: >-
              架构风险：检测到 <strong>NUMA 节点间负载失衡</strong>。
              虽然系统整体繁忙，但节点间利用率差异仍达 <strong>{numa_max_diff:.1f}%</strong>。
              <br>节点状态: {numa_status_msg}

          - name: "微架构瓶颈 (TMA L1)"
            precondition: "True"
            sub_rules:
              - name: "前端瓶颈 (Frontend Bound)"
                precondition: "tma_frontend_bound > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>前端瓶颈 (Frontend Bound)</strong> 占比为 <strong>{tma_frontend_bound:.2f}%</strong>。CPU 指令供给侧（取指/解码）存在显著延迟。 (来源: {tma_source_label})"
              - name: "后端瓶颈 (Backend Bound)"
                precondition: "tma_backend_bound > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>后端瓶颈 (Backend Bound)</strong> 占比为 <strong>{tma_backend_bound:.2f}%</strong>。CPU 后端执行单元或内存子系统存在显著停顿。 (来源: {tma_source_label})"
              - name: "错误推测 (Bad Speculation)"
                precondition: "tma_bad_speculation > TMA_DOMINANT_THRESHOLD_PERCENT"
                finding: "TMA L1 诊断：<strong>错误推测 (Bad Speculation)</strong> 占比为 <strong>{tma_bad_speculation:.2f}%</strong>。CPU 浪费了大量周期在最终被丢弃的指令路径上。 (来源: {tma_source_label})"
              - name: "指令交付 (Retiring)"
                precondition: "tma_retiring > 0"
                finding: "TMA L1 状态：<strong>指令交付率 (Retiring)</strong> 为 <strong>{tma_retiring:.2f}%</strong>，代表 CPU 流水线的实际有效产出。 (来源: {tma_source_label})"

      - name: "OFF-CPU 瓶颈"
        precondition: >-
          not (
            is_cpu_imbalanced or
            (total_cpu > ON_CPU_THRESHOLD_PERCENT)
          )
        finding: "初步诊断：系统瓶颈为 <strong>OFF-CPU</strong>，总 CPU 利用率仅为 <strong>{total_cpu:.2f}%</strong>，CPU 有大量时间在等待外部资源。"
        sub_rules:
          # --- 磁盘 I/O 瓶颈分支 ---
          - name: "磁盘 I/O 瓶颈"
            precondition: "avg_util > IO_UTIL_HIGH_THRESHOLD"
            finding: "根因推断：<strong>磁盘 I/O 瓶颈</strong>。磁盘利用率持续处于高位 (平均 <strong>{avg_util:.2f}%</strong>)。"
            sub_rules:
              - name: "吞吐量饱和"
                precondition: "avg_avgqu_sz > IO_QUEUE_HIGH_THRESHOLD"
                finding: "诊断细化：<strong>吞吐量饱和</strong>。磁盘请求队列过长 (平均 <strong>{avg_avgqu_sz:.2f}</strong>)，表明 I/O 并发请求过多，磁盘已无法及时处理。"
              - name: "高延迟"
                precondition: "avg_await > IO_AWAIT_HIGH_THRESHOLD and avg_iowait > IO_WAIT_HIGH_THRESHOLD"
                finding: "诊断细化：<strong>高延迟</strong>。单次 I/O 请求平均等待时间 (<strong>{avg_await:.2f}ms</strong>) 和 CPU 等待 I/O 的时间比例 (<strong>{avg_iowait:.2f}%</strong>) 均处于高位，明确指向磁盘为瓶颈。"
                sub_rules:
                  - name: "随机读写过多"
                    precondition: "avg_avgrq_sz < IO_SMALL_REQ_SIZE_THRESHOLD"
                    finding: "具体模式：<strong>随机 I/O 密集</strong>。平均请求尺寸非常小 (<strong>{avg_avgrq_sz:.2f} KB</strong>)，这加剧了磁盘寻道时间，导致高延迟。"
          - name: "网络瓶颈"
            precondition: >-
              avg_ifutil > NET_UTIL_HIGH_THRESHOLD or
              avg_ifutil < NET_UTIL_LOW_THRESHOLD
            finding: "网络状态分析：检测到网络利用率异常。平均网络接口利用率为 <strong>{avg_ifutil:.2f}%</strong>。"
            sub_rules:
              - name: "带宽过载/吞吐瓶颈"
                precondition: "avg_ifutil > NET_UTIL_HIGH_THRESHOLD"
                finding: "根因推断：<strong>网络带宽过载</strong>。网络接口利用率持续高于 <strong>{NET_UTIL_HIGH_THRESHOLD}%</strong>，物理链路已饱和。"
              - name: "物理链路未被充分利用"
                precondition: "avg_ifutil < NET_UTIL_LOW_THRESHOLD"
                finding: "诊断提示：<strong>物理链路未被充分利用</strong>。网络接口利用率低于 <strong>{NET_UTIL_LOW_THRESHOLD}%</strong>，瓶颈可能存在于应用层或 TCP/IP 协议栈。"

          # --- 内存瓶颈分支
          - name: "内存瓶颈"
            precondition: >-
              avg_memused_percent > MEM_USED_HIGH_THRESHOLD or
              avg_commit_percent > MEM_COMMIT_HIGH_THRESHOLD
            finding: "内存状态分析：检测到系统级内存压力。内存使用率 (<strong>{avg_memused_percent:.2f}%</strong>) 或承诺率 (<strong>{avg_commit_percent:.2f}%</strong>) 过高。"
            sub_rules:
              - name: "物理内存不足"
                precondition: "avg_memused_percent > MEM_USED_HIGH_THRESHOLD"
                finding: "根因推断：<strong>物理内存不足</strong>。系统内存使用率持续过高 (平均 <strong>{avg_memused_percent:.2f}%</strong>)，可能导致性能下降。"
                sub_rules:
                  - name: "频繁换页 (Swapping)"
                    precondition: "avg_swaps > HIGH_SWAP_RATE_PER_SEC"
                    finding: "诊断细化：<strong>系统正在频繁换页 (Swapping)</strong>。平均换页速率为 <strong>{avg_swaps:.1f} pages/s</strong>，这是物理内存严重不足的明确信号，将导致严重的磁盘 I/O 压力。"
                  - name: "高缺页中断 (Paging)"
                    precondition: "avg_majflt_s > MAJFLT_HIGH_THRESHOLD"
                    finding: "诊断细化：<strong>高缺页中断 (Major Page Faults)</strong>。系统频繁发生严重缺页中断 (平均 <strong>{avg_majflt_s:.1f}/s</strong>)，意味着进程需要从磁盘读取内存页，这是性能下降的直接原因。"
              - name: "内存超售风险"
                precondition: "avg_commit_percent > MEM_COMMIT_HIGH_THRESHOLD"
                finding: "风险提示：<strong>内存超售 (Overcommit)</strong>。已分配的虚拟内存总量超过了物理内存+交换空间的总和 (承诺率 <strong>{avg_commit_percent:.2f}%</strong>)。在内存压力增大时，可能导致 OOM Killer 随机杀死进程。"
          # --- 调度瓶颈分支 ---
          - name: "调度瓶颈"
            precondition: >-
              (avg_load1 / num_cpu > HIGH_LOAD_AVG_RATIO_TO_CPU) or
              (avg_cswch > HIGH_CSWCH_RATE_PER_SEC) or
              (avg_irq_percent > HIGH_IRQ_PERCENT_THRESHOLD) or
              (avg_softirq_percent > HIGH_SOFTIRQ_PERCENT_THRESHOLD)
            finding: "调度分析：检测到系统调度层存在压力或瓶颈。"
            sub_rules:
              - name: "系统负载过高"
                precondition: "avg_load1 / num_cpu > HIGH_LOAD_AVG_RATIO_TO_CPU"
                finding: "诊断细化：<strong>系统平均负载过高</strong>。1分钟平均负载 (<strong>{avg_load1:.2f}</strong>) 已超过 CPU 核心数 (<strong>{num_cpu}</strong>) 的 <strong>{high_load_avg_ratio_to_cpu_percent:.0f}%</strong>，大量进程在排队等待 CPU 时间。"
              - name: "高上下文切换"
                precondition: "avg_nvcswch_s > HIGH_NVCSWCH_RATE_PER_SEC"
                finding: "诊断细化：<strong>锁竞争或线程抖动</strong>。系统非自愿上下文切换过于频繁 (平均 <strong>{avg_nvcswch_s:.0f}/s</strong>)，通常由过多的活跃线程抢占 CPU 或严重的内核/应用锁竞争导致。"
              - name: "中断压力过高"
                precondition: >-
                  avg_irq_percent > HIGH_IRQ_PERCENT_THRESHOLD or
                  avg_softirq_percent > HIGH_SOFTIRQ_PERCENT_THRESHOLD
                finding: "诊断细化：<strong>中断压力过高</strong>。CPU 大量时间用于处理中断 (硬中断: <strong>{avg_irq_percent:.2f}%</strong>, 软中断: <strong>{avg_softirq_percent:.2f}%</strong>)。"
                sub_rules:
                  - name: "硬中断瓶颈"
                    precondition: "avg_irq_percent > HIGH_IRQ_PERCENT_THRESHOLD"
                    finding: "具体原因：<strong>硬中断 (irq) 瓶颈</strong>。需检查中断来源 (`/proc/interrupts`)，可能是网卡、磁盘控制器等硬件设备过于繁忙。考虑开启中断合并 (coalescing) 或调整 CPU 亲和性 (irqbalance)。"
                  - name: "软中断瓶颈"
                    precondition: "avg_softirq_percent > HIGH_SOFTIRQ_PERCENT_THRESHOLD"
                    finding: "具体原因：<strong>软中断 (softirq) 瓶颈</strong>。通常与网络数据包处理 (NET_RX/NET_TX) 或定时器有关。需深入分析 (`/proc/softirqs`) 是哪种软中断占主导。"
