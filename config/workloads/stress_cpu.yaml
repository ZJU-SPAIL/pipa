# config/workloads/stress_cpu.yaml

workload_name: stress_cpu

# --- Service Management ---
# 对于 stress-ng 这种无状态的工具，我们不需要启停服务
commands:
  start: "echo 'No service to start for stress-ng.'"
  stop: "echo 'No service to stop for stress-ng.'"

# --- Benchmark Driver Definition ---
benchmark_driver:
  # 我们的“强度”就是 CPU worker 的数量 (--cpu)
  command_template: "stress-ng --cpu {intensity} --timeout 300s" # 压测时间要足够长

  intensity_variable:
    name: "cpu-workers"
    # 我们可以用 nproc 动态获取 CPU 核心数
    min: 1
    max: $(nproc)

  # stress-ng 进程的名字通常是 stress-ng
  target_pid_command: "pgrep stress-ng | tr '\\n' ',' | sed 's/,$//'"

# --- Target Load Level Definitions ---
target_load_levels:
  low:
    target_metric: "cpu_utilization"
    target_range: [15, 25] # 目标：CPU利用率 20% 左右
  medium:
    target_metric: "cpu_utilization"
    target_range: [45, 55] # 目标：CPU利用率 50% 左右
  high:
    target_metric: "cpu_utilization"
    target_range: [90, 100] # 目标：CPU利用率 95% 左右

collectors:
  macro: # 宏观指标采集阶段
    - name: perf_stat
      enabled: true
      mode: "pid"
      all_threads: true
      duration: 10 # 为了快速测试，设为 10 秒
      event_groups:
        - ["cycles", "instructions"]
        - ["cache-references", "cache-misses"]
        - ["branch-instructions", "branch-misses"]
    # - name: sar_cpu
    #   enabled: true
    #   duration: 10
    #   interval: 1

  micro: # 微观画像采集阶段
    - name: perf_record
      enabled: false # 暂时禁用
      duration: 10
      frequency: 99
      call_graph: "fp" # frame pointer
