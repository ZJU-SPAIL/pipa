workload_name: mysql

# Service Management
commands:
  start: "echo 'Simulating: Starting MySQL...'" # 使用 echo 来模拟
  stop: "echo 'Simulating: Stopping MySQL...'"

# Benchmark Driver Definition
benchmark_driver:
  command_template: "echo 'Simulating: Running benchmark with threads={intensity}'"
  intensity_variable:
    name: "threads"
    min: 8
    max: 256
  target_pid_command: "echo 12345" # 模拟一个 PID

# Target Load Level Definitions
target_load_levels:
  low:
    target_metric: "cpu_utilization"
    target_range: [0, 20]
  medium:
    target_metric: "cpu_utilization"
    target_range: [75, 85]
  high:
    target_metric: "cpu_utilization"
    target_range: [95, 100]
